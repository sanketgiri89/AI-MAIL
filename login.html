<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Eclatrecon AI Mail - Login</title>
    <meta name="description" content="Sign in to Eclatrecon AI Mail - your AI-powered email client." />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#ec5b13", "background-dark": "#0a0a0a", "neutral-dark": "#1a1a1a", "accent-red": "#ff3b30" },
                    fontFamily: { "display": ["Public Sans", "sans-serif"], "mono": ["Courier New", "monospace"] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="font-display text-slate-100">
    <div class="auth-bg">
        <!-- Floating Orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <!-- Login Card -->
        <div class="auth-card">
            <!-- Logo -->
            <div class="flex flex-col items-center mb-8" style="animation: fadeInDown 0.6s ease-out;">
                <div class="size-14 flex items-center justify-center bg-primary rounded-full glyph-glow mb-4"
                    style="animation: glow-pulse 3s ease-in-out infinite;">
                    <span class="material-symbols-outlined text-white text-3xl">blur_on</span>
                </div>
                <h1 class="text-2xl font-bold tracking-tighter dot-matrix text-slate-100">Eclatrecon AI Mail</h1>
                <p class="text-sm text-slate-500 mt-1">Sign in to your account</p>
            </div>

            <!-- Form -->
            <form id="login-form" class="flex flex-col gap-4" onsubmit="handleLogin(event)">
                <div class="auth-input-wrapper" style="animation: fadeInUp 0.5s ease-out 0.1s both;">
                    <span class="material-symbols-outlined auth-input-icon">mail</span>
                    <input type="email" class="auth-input" placeholder="Email address" required id="login-email" />
                </div>

                <div class="auth-input-wrapper" style="animation: fadeInUp 0.5s ease-out 0.2s both;">
                    <span class="material-symbols-outlined auth-input-icon">lock</span>
                    <input type="password" class="auth-input" placeholder="Password" required id="login-password"
                        style="padding-right: 2.75rem;" />
                    <button type="button"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors"
                        onclick="togglePassword('login-password', this)">
                        <span class="material-symbols-outlined text-lg">visibility_off</span>
                    </button>
                </div>

                <div class="flex items-center justify-between text-sm"
                    style="animation: fadeInUp 0.5s ease-out 0.3s both;">
                    <label class="flex items-center gap-2 text-slate-400 cursor-pointer">
                        <input type="checkbox"
                            class="rounded border-white/10 bg-white/5 text-primary focus:ring-primary/50 size-4" />
                        <span class="text-xs">Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="text-xs text-primary hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn mt-2" style="animation: fadeInUp 0.5s ease-out 0.4s both;">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6" style="animation: fadeIn 0.5s ease-out 0.5s both;">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-xs text-slate-500 font-mono">OR</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Social Login -->
            <div class="flex gap-3" style="animation: fadeInUp 0.5s ease-out 0.6s both;">
                <button class="social-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>
                <button class="social-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"
                            fill="#fff" />
                    </svg>
                    GitHub
                </button>
            </div>

            <!-- Signup Link -->
            <p class="text-center text-sm text-slate-500 mt-6" style="animation: fadeIn 0.5s ease-out 0.7s both;">
                Don't have an account? <a href="signup.html" class="text-primary hover:underline font-medium">Sign
                    Up</a>
            </p>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        // Auto-redirect if already logged in
        if (localStorage.getItem('nm_token')) window.location.href = 'index.html#/inbox';

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('.material-symbols-outlined');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.textContent = input.type === 'password' ? 'visibility_off' : 'visibility';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.auth-btn');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            btn.textContent = 'Signing in...';
            btn.style.opacity = '0.7';

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.requires2FA) {
                    const code = prompt('Enter your 2FA code:');
                    if (code) {
                        const res2 = await fetch(`${API}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password, totpCode: code })
                        });
                        const data2 = await res2.json();
                        if (data2.token) {
                            localStorage.setItem('nm_token', data2.token);
                            localStorage.setItem('nm_user', JSON.stringify(data2.user));
                            window.location.href = 'index.html#/inbox';
                        } else { throw new Error(data2.error); }
                    }
                    return;
                }

                if (data.token) {
                    localStorage.setItem('nm_token', data.token);
                    localStorage.setItem('nm_user', JSON.stringify(data.user));
                    window.location.href = 'index.html#/inbox';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (err) {
                btn.textContent = 'Sign In';
                btn.style.opacity = '1';
                alert(err.message || 'Login failed. Please try again.');
            }
        }
    </script>
</body>

</html>
