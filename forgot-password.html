<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Eclatrecon AI Mail</title>
    <meta name="description" content="Reset your Eclatrecon AI Mail password">
    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        body { background: #0a0a0f; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; font-family: 'Space Grotesk', system-ui, sans-serif; }
        .reset-card { background: #111118; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; background: linear-gradient(135deg, #ec5b13, #ff8a50); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        h2 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
        .subtitle { color: #64748b; font-size: 14px; margin: 0 0 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { font-size: 12px; color: #64748b; font-weight: 500; display: block; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        .form-input:focus { border-color: #ec5b13; }
        .submit-btn { width: 100%; padding: 14px; background: #ec5b13; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { text-align: center; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .message.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #10b981; display: block; }
        .message.error { background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.2); color: #ff3b30; display: block; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #64748b; font-size: 13px; text-decoration: none; }
        .back-link a:hover { color: #ec5b13; }
        .pass-requirements { font-size: 11px; color: #475569; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="logo"><h1>ECLATRECON AI MAIL</h1></div>

        <!-- REQUEST RESET FORM -->
        <div id="request-form">
            <h2>Forgot Password?</h2>
            <p class="subtitle">Enter your email and we'll send you a reset link.</p>
            <div id="request-msg" class="message"></div>
            <form onsubmit="requestReset(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reset-email" class="form-input" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="submit-btn" id="request-btn">
                    <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;margin-right:6px">mail</span>
                    Send Reset Link
                </button>
            </form>
            <div class="back-link"><a href="/login">← Back to Login</a></div>
        </div>

        <!-- RESET PASSWORD FORM -->
        <div id="reset-form" style="display:none">
            <h2>Set New Password</h2>
            <p class="subtitle">Enter your new password below.</p>
            <div id="reset-msg" class="message"></div>
            <form onsubmit="resetPassword(event)">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" class="form-input" placeholder="Min 6 characters" required minlength="6">
                    <p class="pass-requirements">Minimum 6 characters</p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="submit-btn" id="reset-btn">
                    <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;margin-right:6px">lock_reset</span>
                    Reset Password
                </button>
            </form>
            <div class="back-link"><a href="/login">← Back to Login</a></div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (token) {
            document.getElementById('request-form').style.display = 'none';
            document.getElementById('reset-form').style.display = '';
        }

        async function requestReset(e) {
            e.preventDefault();
            const btn = document.getElementById('request-btn');
            const msg = document.getElementById('request-msg');
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                const res = await fetch(`${API}/auth/forgot-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('reset-email').value })
                });
                const data = await res.json();
                msg.className = 'message success';
                msg.textContent = data.message || 'If the email exists, a reset link has been sent.';
                msg.style.display = 'block';
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = 'Network error. Try again.';
                msg.style.display = 'block';
            }
            btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;margin-right:6px">mail</span>Send Reset Link';
        }

        async function resetPassword(e) {
            e.preventDefault();
            const newPass = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const msg = document.getElementById('reset-msg');
            const btn = document.getElementById('reset-btn');

            if (newPass !== confirm) { msg.className = 'message error'; msg.textContent = 'Passwords do not match.'; msg.style.display = 'block'; return; }
            if (newPass.length < 6) { msg.className = 'message error'; msg.textContent = 'Password must be 6+ characters.'; msg.style.display = 'block'; return; }

            btn.disabled = true; btn.textContent = 'Resetting...';
            try {
                const res = await fetch(`${API}/auth/reset-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: newPass })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.className = 'message success';
                    msg.textContent = data.message || 'Password reset! Redirecting to login...';
                    msg.style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 2500);
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.error || 'Reset failed.';
                    msg.style.display = 'block';
                }
            } catch (err) {
                msg.className = 'message error'; msg.textContent = 'Network error.'; msg.style.display = 'block';
            }
            btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;margin-right:6px">lock_reset</span>Reset Password';
        }
    </script>
</body>
</html>
